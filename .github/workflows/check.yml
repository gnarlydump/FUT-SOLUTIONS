name: Check fut.gg for new evolutions and SBCs

on:
  schedule:
    # Runs at the top of every hour (GitHub may delay this by a few minutes
    # during busy periods -- that's normal for scheduled Actions).
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the updated state file

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run bot
        env:
          EVOLUTIONS_WEBHOOK_URL: ${{ secrets.EVOLUTIONS_WEBHOOK_URL }}
          SBC_WEBHOOK_URL: ${{ secrets.SBC_WEBHOOK_URL }}
          OBJECTIVES_WEBHOOK_URL: ${{ secrets.OBJECTIVES_WEBHOOK_URL }}
        run: python bot.py

      - name: Commit updated state
        run: |
          git config user.name "futgg-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "Update seen evolutions/SBCs state"
          git push
